<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/style.css}" />
    <link rel="stylesheet" th:href="@{/loading.css}" />
  </head>
  <body>
    <div class="box-container">
      <h1>Login To Your Blackjack Account</h1>
      <span class="error" id="error"></span>
      <form onsubmit="login(event)">
        <div class="any input username">
          <label for="username">Username</label>
          <input type="text" id="username" name="username"/>
        </div>

        <div class="any input lower">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"/>
        </div>
        <a href="/forgotPassword" class="here lower">Forgot Password?</a>
        <button class="submit-btn loader" type="submit" value="Login" id="loader">Login</button>
      </form>
      <br>
      <p>Dont have an account? Register<a href="/register" class="here">here</a></p>
    </div>

  <script th:src="@{/auth.js}"></script>
  <script th:src="@{/loading.js}"></script>
  </body>
</html>
